<section class="py-5">
  <div class="container">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h1 class="h5 mb-0">Fulfillment</h1>
      <span class="badge bg-warning-subtle text-warning-emphasis">Sales / Admin / Super Admin</span>
    </div>
    <div class="card mb-3">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-4">
            <label class="form-label">Assign rider</label>
            <input class="form-control" [(ngModel)]="riderName" placeholder="Rider name" />
          </div>
          <div class="col-md-4">
            <label class="form-label">Rider phone</label>
            <input class="form-control" [(ngModel)]="riderPhone" placeholder="e.g. 0500 000 000" />
          </div>
          <div class="col-md-4">
            <label class="form-label">Status</label>
            <select class="form-select" [(ngModel)]="selectedStatus">
              <option value="out_for_delivery">Out for delivery</option>
              <option value="pending">Pending</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <div class="col-md-12 text-end">
            <small class="text-muted d-block">Select an order below to apply assignment.</small>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-md-6" *ngFor="let order of pendingOrders">
        <div class="card h-100">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <div>
                <div class="fw-semibold">Order #{{ order.id }}</div>
                <small class="text-muted">{{ order.items.length }} items · GHS {{ order.total }}</small>
              </div>
              <span class="badge bg-secondary-subtle text-secondary-emphasis text-uppercase">{{ order.status }}</span>
            </div>
            <ul class="list-unstyled mb-2">
              <li *ngFor="let item of order.items" class="text-muted small">
                {{ item.quantity }} x {{ item.name }}
              </li>
            </ul>
            <div class="d-flex gap-2">
              <button class="btn btn-outline-success btn-sm" (click)="assign(order.id)">
                Assign to rider
              </button>
              <button class="btn btn-success btn-sm" (click)="complete(order.id)">
                Mark completed
              </button>
            </div>
            <div *ngIf="order.riderName" class="text-muted small mt-2">
              Rider: {{ order.riderName }}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
