<section class="py-4">
  <div class="d-flex flex-column flex-md-row align-items-start justify-content-between gap-2 mb-4">
    <div>
      <p class="text-success text-uppercase small mb-1">Dashboard</p>
      <h1 class="h4 mb-0">Welcome, {{ roles.currentUser()?.name || 'team member' }}</h1>
      <div class="text-muted small">Role: {{ roles.currentRole() }}</div>
    </div>
  </div>

  <div *ngIf="cards().length; else emptyState" class="row g-3">
    <div class="col-12 col-md-6 col-lg-4" *ngFor="let card of cards()">
      <a class="text-decoration-none h-100 d-block" [routerLink]="card.link">
        <div class="card h-100 shadow-sm hover-lift">
          <div class="card-body d-flex align-items-start gap-3">
            <div class="icon-circle">
              <i class="bi" [ngClass]="card.icon"></i>
            </div>
            <div>
              <div class="fw-semibold">{{ card.title }}</div>
              <div class="text-muted small">{{ card.description }}</div>
            </div>
          </div>
        </div>
      </a>
    </div>
  </div>

  <ng-template #emptyState>
    <div class="alert alert-info mb-0">No additional tools are available for your role yet.</div>
  </ng-template>
</section>
