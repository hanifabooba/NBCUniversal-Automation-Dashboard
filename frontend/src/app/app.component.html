<div class="app-shell" [class.app-shell--bare]="isHomeRoute">
  <header class="app-header shadow-sm" *ngIf="!isHomeRoute">
    <div class="container d-flex align-items-center justify-content-between gap-3 flex-wrap">
      <button class="btn btn-outline-light d-lg-none" type="button" (click)="toggleMenu()">
        <i class="bi" [ngClass]="menuOpen ? 'bi-x-lg' : 'bi-list'"></i>
      </button>
      <a
        class="app-header__brand d-flex align-items-center text-white justify-content-start"
        href="https://qa-dashboard.otsops.com/dashboard"
        (click)="menuOpen = false"
      >
        <div class="app-header__title">{{ title }}</div>
      </a>
      <nav class="nav nav-pills gap-2 flex-wrap mobile-nav" [class.open]="menuOpen">
        <a
          class="nav-link text-white"
          routerLink="/dashboard"
          routerLinkActive="active"
          (click)="menuOpen = false"
        >
          <i class="bi bi-grid-1x2-fill me-1"></i>
          Dashboard
        </a>
      <a class="nav-link text-white" routerLink="/environmen-health" routerLinkActive="active" (click)="menuOpen = false">
        <i class="bi bi-hdd-network me-1"></i>
        Environment Health
      </a>
      <a class="nav-link text-white" routerLink="/test-history" routerLinkActive="active" (click)="menuOpen = false">
        <i class="bi bi-gear-wide-connected me-1"></i>
        Test History
      </a>
      <a class="nav-link text-white" routerLink="/team-weekly-task" routerLinkActive="active" (click)="menuOpen = false">
        <i class="bi bi-people me-1"></i>
        Team Weekly Task
      </a>
      <a class="nav-link text-white" routerLink="/executetest" routerLinkActive="active" (click)="menuOpen = false">
        <i class="bi bi-terminal-dash me-1"></i>
        Execute Test
      </a>
      <a class="nav-link text-white" routerLink="/mobile-app-board" routerLinkActive="active" (click)="menuOpen = false">
        <i class="bi bi-phone-vibrate me-1"></i>
        Mobile App Board
      </a>
      <a class="nav-link text-white" routerLink="/results" routerLinkActive="active" (click)="menuOpen = false">
        <i class="bi bi-speedometer2 me-1"></i>
        Results Dashboard
      </a>
      </nav>
    </div>
  </header>

  <main class="app-main" [class.app-main--full]="isHomeRoute">
    <div [ngClass]="{ container: !isHomeRoute }">
      <router-outlet></router-outlet>
    </div>
  </main>

  <footer class="app-footer" *ngIf="!isHomeRoute">
    <div class="container text-center">
      <span class="text-white-50">Copyright © 2026 NBCUniversal Media, LLC. All rights reserved</span>
    </div>
  </footer>
</div>
